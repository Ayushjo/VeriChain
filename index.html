
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VeriChain: Fake News Detector</title>

    <!-- Classic Newspaper Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Merriweather:wght@300;400;700;900&family=Libre+Baskerville:wght@400;700&family=Courier+Prime:wght@400;700&family=EB+Garamond:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              'serif': ['Playfair Display', 'Georgia', 'serif'],
              'serif-alt': ['Merriweather', 'Georgia', 'serif'],
              'body': ['Libre Baskerville', 'Georgia', 'serif'],
              'mono': ['Courier Prime', 'Courier New', 'monospace'],
              'headline': ['EB Garamond', 'Playfair Display', 'serif'],
            },
            colors: {
              'newspaper': {
                'cream': '#F8F5E6',
                'paper': '#FFFCF0',
                'ink': '#1a1a1a',
                'border': '#000000',
                'gray': '#4a4a4a',
              }
            }
          }
        }
      }
    </script>

    <style>
      /* Classic Newspaper Global Styles */
      * {
        box-sizing: border-box;
      }

      body {
        font-family: 'Libre Baskerville', Georgia, serif;
        background: #F8F5E6;
        overflow-x: hidden;
      }

      /* Paper Texture Background */
      .subtle-pattern {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image:
          url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' /%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
      }

      /* Smooth Fade In */
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      .animate-fade-in {
        animation: fadeIn 0.6s ease-out forwards;
      }

      /* Gentle Slide Up */
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-slide-up {
        animation: slideUp 0.6s ease-out forwards;
      }

      /* Floating Animation for SVGs */
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }

      .animate-float {
        animation: float 3s ease-in-out infinite;
      }

      /* Subtle Pulse */
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.8; }
      }

      .animate-pulse-subtle {
        animation: pulse 2s ease-in-out infinite;
      }

      /* Newspaper Card Style */
      .elegant-card {
        background: #FFFCF0;
        border: 2px solid #000000;
        box-shadow: none;
        transition: all 0.2s ease;
      }

      .elegant-card:hover {
        box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.1);
        transform: translateX(-2px) translateY(-2px);
      }

      /* Smooth Transitions */
      .smooth-transition {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
      }

      ::-webkit-scrollbar-track {
        background: #F8F5E6;
        border-left: 1px solid #000;
      }

      ::-webkit-scrollbar-thumb {
        background: #1a1a1a;
        border: 2px solid #F8F5E6;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #000000;
      }

      /* SVG Animation Keyframes */
      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes dash {
        to { stroke-dashoffset: 0; }
      }

      .animate-rotate {
        animation: rotate 20s linear infinite;
      }

      /* Table Styles */
      .ledger-table {
        border-collapse: collapse;
        border: 2px solid #000;
      }

      .ledger-table th {
        background: #1a1a1a;
        color: #F8F5E6;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 0.7rem;
        padding: 1rem;
        border: 1px solid #000;
        position: sticky;
        top: 0;
        z-index: 10;
        font-family: 'Merriweather', serif;
      }

      .ledger-table td {
        padding: 1rem;
        border: 1px solid #000;
        font-family: 'Libre Baskerville', serif;
        font-size: 0.85rem;
      }

      .ledger-table tbody tr {
        background: #FFFCF0;
        transition: all 0.2s ease;
      }

      .ledger-table tbody tr:hover {
        background: #F8F5E6;
      }

      /* Ornamental Divider */
      .ornamental-divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 2rem 0;
      }

      .ornamental-divider::before,
      .ornamental-divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid #000;
      }

      .ornamental-divider span {
        padding: 0 1.5rem;
        font-family: 'Playfair Display', serif;
        font-weight: 600;
        font-size: 0.9rem;
        letter-spacing: 2px;
      }

      /* Ink Bleed Effect on Hover */
      .ink-bleed:hover {
        box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.2);
      }

      /* Dateline Style */
      .dateline {
        border-top: 3px double #000;
        border-bottom: 3px double #000;
        padding: 0.5rem 0;
        background: #FFFCF0;
        font-family: 'EB Garamond', serif;
        font-size: 0.7rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-weight: 600;
      }
    </style>

  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.24.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
</head>
  <body class="text-gray-800">
    <div class="subtle-pattern"></div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
